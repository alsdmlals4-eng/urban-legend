name: MVP 기능
description: 플레이어 가치와 검증 가능한 완료 기준이 있는 MVP 기능을 제안합니다.
title: "[MVP-] "
labels:
  - feature
body:
  - type: markdown
    attributes:
      value: |
        구현 전에 `docs/AI_SHARED_WORK_RULES.md`와 `docs/MVP_WORKFLOW_CHECKLIST.md`의 Definition of Ready를 확인합니다.
  - type: textarea
    id: goal
    attributes:
      label: 목표와 플레이어 가치
      description: 왜 필요한지와 플레이어가 무엇을 느끼거나 선택하게 되는지 한 문장 이상으로 적습니다.
    validations:
      required: true
  - type: textarea
    id: flow
    attributes:
      label: 핵심 흐름
      description: 이전 상태에서 시작해 어떤 행동을 거쳐 어떤 결과에 도달하는지 적습니다.
      placeholder: 결과 → 준비 → 조사 → 검증 → 저장
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 구현 범위
      description: 실제로 수정할 시스템, 데이터, 씬, 문서를 적습니다.
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: 제외 범위
      description: 이번 MVP에서 하지 않을 항목을 적습니다.
    validations:
      required: true
  - type: textarea
    id: definition-of-done
    attributes:
      label: 완료 기준
      description: 조건 → 행동 → 관찰 결과 형태의 체크리스트로 적습니다.
      placeholder: |
        - [ ] 조건일 때 행동하면 관찰 결과가 표시된다.
        - [ ] 저장 후 불러오면 상태가 유지된다.
    validations:
      required: true
  - type: textarea
    id: godot-check
    attributes:
      label: Godot 확인 순서
      description: 사용자가 실제 게임에서 클릭할 순서와 확인할 화면을 적습니다.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: 영향 범위와 남은 위험
      description: 저장/불러오기, 씬 이동, 데이터 호환성, UI 검수 위험과 대응을 적습니다.
    validations:
      required: true
  - type: textarea
    id: benchmark
    attributes:
      label: 벤치마킹 결론
      description: 필요한 경우 3~5개 사례의 적용/제외 결론과 출처를 적습니다. 단순 구현이면 해당 없음이라고 적습니다.
    validations:
      required: true
  - type: checkboxes
    id: ready
    attributes:
      label: 시작 준비 확인
      options:
        - label: 이전/다음 MVP 연결과 실제 수정 대상 파일을 확인했습니다.
          required: true
        - label: HTML 대시보드 작업과 Codex 구현 작업을 분리했습니다.
          required: true
        - label: 요청 범위 밖 리팩터링을 포함하지 않았습니다.
          required: true

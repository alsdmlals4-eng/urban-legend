name: Apply CORE-MVP-001 review fix

on:
  push:
    branches:
      - agent/core-mvp-001-poc-20260724
    paths:
      - ".github/workflows/apply-core-mvp-review-fix.yml"

concurrency:
  group: apply-core-mvp-review-fix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-review-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/core-mvp-001-poc-20260724
          fetch-depth: 0
      - name: Apply exact contract fix and remove diagnostic hook
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          state_path = Path("scripts/poc/core_mvp_001/core_mvp_001_state.gd")
          state = state_path.read_text(encoding="utf-8")
          old = '''\tif not evidence_error.is_empty():
          \t\treturn _response(false, evidence_error, false)
          \t_selected_hypothesis_id = hypothesis_id
          '''
          new = '''\tif not evidence_error.is_empty():
          \t\treturn _response(false, evidence_error, false)
          \tvar required_unresolved := hypothesis.get("unresolved_question_ids", []) as Array
          \tif not _contains_all(unresolved_ids, required_unresolved):
          \t\treturn _response(false, "필수 미해결 질문을 가설 카드에 연결해야 한다.", false)
          \t_selected_hypothesis_id = hypothesis_id
          '''
          if old not in state:
              raise SystemExit("state contract target not found")
          state_path.write_text(state.replace(old, new, 1), encoding="utf-8")

          workflow_path = Path(".github/workflows/validate-core-mvp-001.yml")
          workflow = workflow_path.read_text(encoding="utf-8")
          diagnostic = "            scripts/poc/core_mvp_001/core_mvp_001_state.gd\n"
          if diagnostic not in workflow:
              raise SystemExit("diagnostic artifact path not found")
          workflow_path.write_text(workflow.replace(diagnostic, "", 1), encoding="utf-8")
          PY
          rm .github/workflows/apply-core-mvp-review-fix.yml
      - name: Commit reviewed fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/poc/core_mvp_001/core_mvp_001_state.gd .github/workflows/validate-core-mvp-001.yml .github/workflows/apply-core-mvp-review-fix.yml
          git commit -m "fix: require unresolved questions in hypothesis cards"
          git push origin HEAD:agent/core-mvp-001-poc-20260724

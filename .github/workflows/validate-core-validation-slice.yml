name: Snapshot latest main for clean rebase

on:
  pull_request:
    paths:
      - ".github/workflows/validate-core-validation-slice.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot-main:
    runs-on: ubuntu-latest
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record main commit
        run: git rev-parse HEAD | tee MAIN_COMMIT.txt

      - name: Upload exact main snapshot
        uses: actions/upload-artifact@v4
        with:
          name: urban-legend-latest-main
          path: .
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

name: Recover verified core validation baseline

on:
  pull_request:
    paths:
      - ".github/workflows/validate-core-validation-slice.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Reassemble verified patch from Git objects
        env:
          GH_TOKEN: ${{ github.token }}
          PATCH_TREE_SHA: 498ef1b5def6f1c813f67ffcb77380bf916444b8
        run: |
          set -euo pipefail
          : > "$RUNNER_TEMP/core-validation-1b.patch.gz.b64"
          gh api "repos/$GITHUB_REPOSITORY/git/trees/$PATCH_TREE_SHA" --jq '.tree | sort_by(.path) | .[].sha' > "$RUNNER_TEMP/blob-shas.txt"
          cat "$RUNNER_TEMP/blob-shas.txt"
          while IFS= read -r blob_sha; do
            gh api "repos/$GITHUB_REPOSITORY/git/blobs/$blob_sha" --jq .content \
              | tr -d '\n\r ' \
              | base64 --decode \
              >> "$RUNNER_TEMP/core-validation-1b.patch.gz.b64"
          done < "$RUNNER_TEMP/blob-shas.txt"
          sha256sum "$RUNNER_TEMP/core-validation-1b.patch.gz.b64"
          base64 --decode "$RUNNER_TEMP/core-validation-1b.patch.gz.b64" | gzip --decompress > "$RUNNER_TEMP/core-validation-1b.patch"
          sha256sum "$RUNNER_TEMP/core-validation-1b.patch"
          git apply --check "$RUNNER_TEMP/core-validation-1b.patch"
          git apply "$RUNNER_TEMP/core-validation-1b.patch"
          rm -rf .github/core-validation-1b
          rm -f .github/workflows/apply-core-validation-1b.yml
          git diff --check

      - name: Upload recovered 1B project
        uses: actions/upload-artifact@v4
        with:
          name: urban-legend-core-validation-1b-recovered
          path: .
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

name: Apply reviewed CORE-MVP-001 fix

on:
  pull_request:
    paths:
      - ".github/workflows/validate-core-mvp-001.yml"
      - ".github/workflows/apply-core-mvp-review-fix.yml"

concurrency:
  group: apply-reviewed-core-mvp-fix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-reviewed-fix:
    if: ${{ github.event.pull_request.head.ref == 'agent/core-mvp-001-poc-20260724' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply exact contract fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          state_path = Path("scripts/poc/core_mvp_001/core_mvp_001_state.gd")
          state = state_path.read_text(encoding="utf-8")
          old = '''\tif not evidence_error.is_empty():
          \t\treturn _response(false, evidence_error, false)
          \t_selected_hypothesis_id = hypothesis_id
          '''
          new = '''\tif not evidence_error.is_empty():
          \t\treturn _response(false, evidence_error, false)
          \tvar required_unresolved := hypothesis.get("unresolved_question_ids", []) as Array
          \tif not _contains_all(unresolved_ids, required_unresolved):
          \t\treturn _response(false, "필수 미해결 질문을 가설 카드에 연결해야 한다.", false)
          \t_selected_hypothesis_id = hypothesis_id
          '''
          if old not in state:
              if new not in state:
                  raise SystemExit("state contract target not found")
          else:
              state_path.write_text(state.replace(old, new, 1), encoding="utf-8")
          PY
          rm -f .github/workflows/apply-core-mvp-review-fix.yml
          cat > .github/workflows/validate-core-mvp-001.yml <<'YAML'
          name: Validate CORE-MVP-001

          on:
            pull_request:
              paths:
                - ".github/workflows/validate-core-mvp-001.yml"
                - "data/poc/core_mvp_001/**"
                - "scripts/poc/core_mvp_001/**"
                - "scenes/poc/core_mvp_001/**"
                - "scripts/ui/main_menu.gd"
                - "tests/test_core_mvp_001_data_contract.py"
                - "tests/test_core_mvp_001_static_contract.py"
                - "tests/core_mvp_001_*_test.gd"
                - "tests/run_core_mvp_001_tests.sh"
                - "tests/run_godot_regression.sh"
            workflow_dispatch:

          concurrency:
            group: ci-${{ github.workflow }}-${{ github.ref }}
            cancel-in-progress: true

          permissions:
            contents: read

          jobs:
            ubuntu-code-validation:
              runs-on: ubuntu-latest
              timeout-minutes: 45
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"
                - name: Validate CORE-MVP-001 Python contracts
                  run: |
                    python -m unittest \
                      tests/test_core_mvp_001_data_contract.py \
                      tests/test_core_mvp_001_static_contract.py
                - name: Setup Godot 4.7.1
                  uses: chickensoft-games/setup-godot@v2
                  with:
                    version: 4.7.1
                    use-dotnet: false
                    include-templates: false
                - name: Import project
                  run: godot --headless --path . --import
                - name: Run focused CORE-MVP-001 tests
                  env:
                    GODOT_BIN: godot
                    GODOT_TEST_TMP: ${{ runner.temp }}/core-mvp-001-tests
                  run: bash tests/run_core_mvp_001_tests.sh
                - name: Run full Godot regression
                  env:
                    GODOT_BIN: godot
                    GODOT_TEST_TMP: ${{ runner.temp }}/core-mvp-001-tests
                  run: bash tests/run_godot_regression.sh
                - name: Preserve failure logs
                  if: failure()
                  uses: actions/upload-artifact@v4
                  with:
                    name: core-mvp-001-godot-failure-logs
                    path: |
                      ${{ runner.temp }}/core-mvp-001-tests/focused-logs
                      ${{ runner.temp }}/core-mvp-001-tests/logs
                    if-no-files-found: warn
                    retention-days: 7
          YAML
      - name: Commit reviewed fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/poc/core_mvp_001/core_mvp_001_state.gd .github/workflows/validate-core-mvp-001.yml
          git add -u .github/workflows/apply-core-mvp-review-fix.yml
          if git diff --cached --quiet; then
            echo "No reviewed fix remained to apply."
            exit 0
          fi
          git commit -m "fix: require unresolved questions in hypothesis cards"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

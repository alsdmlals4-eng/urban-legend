name: Apply reviewed CORE-MVP-001 state fix

on:
  pull_request:
    paths:
      - ".github/workflows/validate-core-mvp-001.yml"

concurrency:
  group: apply-reviewed-core-mvp-state-fix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-reviewed-fix:
    if: ${{ github.event.pull_request.head.ref == 'agent/core-mvp-001-poc-20260724' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch state contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/poc/core_mvp_001/core_mvp_001_state.gd")
          text = path.read_text(encoding="utf-8")
          old = '''\tif not evidence_error.is_empty():
          \t\treturn _response(false, evidence_error, false)
          \t_selected_hypothesis_id = hypothesis_id
          '''
          new = '''\tif not evidence_error.is_empty():
          \t\treturn _response(false, evidence_error, false)
          \tvar required_unresolved := hypothesis.get("unresolved_question_ids", []) as Array
          \tif not _contains_all(unresolved_ids, required_unresolved):
          \t\treturn _response(false, "필수 미해결 질문을 가설 카드에 연결해야 한다.", false)
          \t_selected_hypothesis_id = hypothesis_id
          '''
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          elif new not in text:
              raise SystemExit("state contract target not found")
          PY
      - name: Commit state-only fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/poc/core_mvp_001/core_mvp_001_state.gd
          if git diff --cached --quiet; then
            echo "State fix already present."
            exit 0
          fi
          git commit -m "fix: require unresolved questions in hypothesis cards"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

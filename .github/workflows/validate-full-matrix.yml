name: Validate full matrix

on:
  push:
    branches: [main]
  schedule:
    - cron: "20 18 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run Python contract suite
        run: python -m unittest discover -s tests -p "test_*.py"

  godot-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Setup Godot 4.7.1
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.1
          use-dotnet: false
          include-templates: false
      - name: Import project
        run: godot --headless --path . --editor --quit-after 1
      - name: Run full Godot regression
        env:
          GODOT_BIN: godot
          GODOT_TEST_TMP: ${{ runner.temp }}/full-matrix-godot
        run: bash tests/run_godot_regression.sh
      - name: Preserve failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: full-matrix-godot-failure-logs
          path: ${{ runner.temp }}/full-matrix-godot/logs
          if-no-files-found: warn
          retention-days: 7

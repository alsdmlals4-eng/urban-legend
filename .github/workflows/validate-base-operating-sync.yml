name: Validate Base operating sync

on:
  pull_request:
    paths:
      - ".github/pull_request_template.md"
      - ".github/workflows/validate-base-operating-sync.yml"
      - "START_HERE.md"
      - "AGENTS.md"
      - "README.md"
      - "docs/AI_SKILL_ADOPTION_GUIDE.md"
      - "docs/BASE_RULES_VERSION.md"
      - "docs/CURRENT_STATUS.md"
      - "docs/PROJECT_CORE.md"
      - "docs/DOCUMENTATION_MAP.md"
      - "docs/MVP_WORKFLOW_CHECKLIST.md"
      - "docs/OPERATING_MODEL.md"
      - "docs/WORK_MODE_AND_SKILL_ROUTING.md"
      - "docs/qa/BASE_SYNC_AUDIT_*.md"
      - "skills/**"
      - "tests/test_base_operating_sync.py"
      - "tests/test_skill_package_integrity.py"
      - "tests/test_active_document_references.py"
  push:
    branches: [main]
    paths:
      - ".github/pull_request_template.md"
      - ".github/workflows/validate-base-operating-sync.yml"
      - "START_HERE.md"
      - "AGENTS.md"
      - "README.md"
      - "docs/AI_SKILL_ADOPTION_GUIDE.md"
      - "docs/BASE_RULES_VERSION.md"
      - "docs/CURRENT_STATUS.md"
      - "docs/PROJECT_CORE.md"
      - "docs/DOCUMENTATION_MAP.md"
      - "docs/MVP_WORKFLOW_CHECKLIST.md"
      - "docs/OPERATING_MODEL.md"
      - "docs/WORK_MODE_AND_SKILL_ROUTING.md"
      - "docs/qa/BASE_SYNC_AUDIT_*.md"
      - "skills/**"
      - "tests/test_base_operating_sync.py"
      - "tests/test_skill_package_integrity.py"
      - "tests/test_active_document_references.py"

permissions:
  contents: read

jobs:
  validate-base-operating-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate Base, core, routing, local Skill, and active references
        shell: bash
        run: |
          set +e
          python -m unittest \
            tests/test_base_operating_sync.py \
            tests/test_skill_package_integrity.py \
            tests/test_active_document_references.py \
            2>&1 | tee base-operating-sync-unittest.log
          status=${PIPESTATUS[0]}
          echo "$status" > base-operating-sync-exit-code.txt
          exit "$status"
      - name: Preserve validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: base-operating-sync-evidence
          path: |
            base-operating-sync-unittest.log
            base-operating-sync-exit-code.txt
          if-no-files-found: error
          retention-days: 14

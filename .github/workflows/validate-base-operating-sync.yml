name: Validate documentation contracts

on:
  pull_request:
    paths:
      - ".github/pull_request_template.md"
      - ".github/workflows/validate-base-operating-sync.yml"
      - "START_HERE.md"
      - "AGENTS.md"
      - "README.md"
      - "MVP_ROADMAP.md"
      - "TEST_CHECKLIST.md"
      - "docs/**"
      - "skills/**"
      - "tests/test_base_operating_sync.py"
      - "tests/test_skill_package_integrity.py"
      - "tests/test_active_document_references.py"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ubuntu-document-validation:
    if: ${{ vars.CI_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate Base, core, routing, local Skill, and active references
        shell: bash
        run: |
          set +e
          python -m unittest \
            tests/test_base_operating_sync.py \
            tests/test_skill_package_integrity.py \
            tests/test_active_document_references.py \
            2>&1 | tee documentation-validation.log
          status=${PIPESTATUS[0]}
          echo "$status" > documentation-validation-exit-code.txt
          exit "$status"
      - name: Preserve failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: documentation-validation-failure
          path: |
            documentation-validation.log
            documentation-validation-exit-code.txt
          if-no-files-found: error
          retention-days: 7

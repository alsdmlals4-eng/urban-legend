name: Finalize active document references

on:
  pull_request:
    paths:
      - ".github/workflows/apply-core-validation-manual-promotion.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize-references:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.ref || 'agent/core-validation-manual-promotion' }}
          fetch-depth: 0

      - name: Remove stale branch reference and expand audit coverage
        run: |
          python - <<'PY'
          from pathlib import Path

          qa = Path('docs/qa/CORE_VALIDATION_SLICE_001.md')
          qa_text = qa.read_text(encoding='utf-8')
          old = '> 대상 브랜치: `agent/core-validation-slice`'
          new = '> 적용 기준: 최신 `main` 기반 clean PR. 실제 브랜치·커밋은 PR 메타데이터를 따른다.'
          if old not in qa_text:
              raise SystemExit('stale QA branch marker not found')
          qa.write_text(qa_text.replace(old, new, 1), encoding='utf-8')

          test = Path('tests/test_active_document_references.py')
          text = test.read_text(encoding='utf-8')
          text = text.replace(
              ']\nBASELINE_DOCS = ACTIVE_DOCS\n',
              ']\nCORE_VALIDATION_QA = ROOT / "docs/qa/CORE_VALIDATION_SLICE_001.md"\nREFERENCE_AUDIT_DOCS = ACTIVE_DOCS + [CORE_VALIDATION_QA]\nBASELINE_DOCS = ACTIVE_DOCS\n',
              1,
          )
          text = text.replace(
              '    re.compile(r"apply-core-validation-1b\\.yml"),\n',
              '    re.compile(r"apply-core-validation-1b\\.yml"),\n    re.compile(r"agent/core-validation-slice"),\n',
              1,
          )
          text = text.replace(
              '        for path in ACTIVE_DOCS:\n            text = path.read_text(encoding="utf-8")\n            for pattern in STALE_FILE_PATTERNS:',
              '        for path in REFERENCE_AUDIT_DOCS:\n            text = path.read_text(encoding="utf-8")\n            for pattern in STALE_FILE_PATTERNS:',
              1,
          )
          required = (
              'CORE_VALIDATION_QA',
              'REFERENCE_AUDIT_DOCS',
              'agent/core-validation-slice',
              'for path in REFERENCE_AUDIT_DOCS:',
          )
          if not all(item in text for item in required):
              raise SystemExit('reference audit transformation incomplete')
          test.write_text(text, encoding='utf-8')
          PY
          git diff --check

      - name: Run active-reference contracts
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Commit finalized references
        run: |
          git restore --source=HEAD -- .github/workflows/apply-core-validation-manual-promotion.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/qa/CORE_VALIDATION_SLICE_001.md tests/test_active_document_references.py
          git diff --cached --check
          git commit -m "docs: finalize core validation reference baseline"
          git push origin HEAD:${{ github.event.pull_request.head.ref || 'agent/core-validation-manual-promotion' }}
